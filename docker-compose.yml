services:
  material-upload:
    build: .
    container_name: yinike-material-upload
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      BASE_PATH: "${BASE_PATH:-}"
      UPLOAD_DATA_DIR: /app/data
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-30}"
      UPLOAD_PASSWORD: "${UPLOAD_PASSWORD:-20250605}"
      INTERNAL_PASSWORD: "${INTERNAL_PASSWORD:-20250605}"
      MINERU_API_KEY: "${MINERU_API_KEY:-}"
      MINERU_AUTO_PARSE: "${MINERU_AUTO_PARSE:-false}"
      MINERU_MODEL_VERSION: "${MINERU_MODEL_VERSION:-vlm}"
      MINERU_LANGUAGE: "${MINERU_LANGUAGE:-ch}"
      MINERU_MAX_WAIT_SECONDS: "${MINERU_MAX_WAIT_SECONDS:-12}"
    volumes:
      - ./data:/app/data
