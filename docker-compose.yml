services:
  material-upload:
    build: .
    container_name: yinike-material-upload
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      UPLOAD_DATA_DIR: /app/data
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-30}"
    volumes:
      - ./data:/app/data
